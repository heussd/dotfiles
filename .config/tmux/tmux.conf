#
##allow cursor to be moved to the front
#unbind-key C-b
#bind-key C-a send-prefix



# force a reload of the config file
unbind r
bind r source-file ~/.config/tmux/tmux.conf


# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %


# switch panes using Alt+hjkl without prefix
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R


# move around panes with hjkl, as one would in vim after pressing ctrl-w
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R


# Use Alt+arrow keys to switch windows without prefix
bind -n M-Left previous-window
bind -n M-Right next-window

# Use Shift+arrow to switch windows
bind -n S-Left previous-window
bind -n S-Right next-window

# Use Alt+number for direct window selection without prefix
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2


bind-key X kill-pane


# DESIGN TWEAKS

# modern terminal capabilities
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:RGB"

# responsive updates
set -g status-interval 2

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# copy mode
setw -g mode-style 'fg=#111418 bg=#89b4fa bold'

# panes
set -g pane-border-style 'fg=#2a2f3a'
set -g pane-active-border-style 'fg=#89b4fa'

set -g mouse on

# command and mode prompts
set -g message-style 'fg=#cdd6f4,bg=#1b1f2a'
set -g message-command-style 'fg=#111418,bg=#a6e3a1'

# window title behavior
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}/#{pane_current_command}'
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'default'
set -g status 2
set -g status-format[0] ''
set -g status-format[1] '#[align=left]#{E:status-left}#{W:#{E:window-status-format},#{E:window-status-current-format}}#[align=right]#{E:status-right}'

set -g status-left ' #S |'
set -g status-left-length 24

set -g status-right-style 'default'
set -g status-right '#{?client_prefix,PREFIX | ,} #(~/.config/tmux/scripts/cpu_usage.sh)%%%  #(~/.config/tmux/scripts/memory_usage.sh)%%% | %Y-%m-%d %H:%M '
set -g status-right-length 90

setw -g window-status-separator ''
setw -g window-status-style 'default'
setw -g window-status-format ' #I #W '

setw -g window-status-current-style 'fg=#111418,bg=#d3d7de'
setw -g window-status-current-format '#[fg=#111418,bg=#d3d7de] #I #W #[default]'
setw -g window-status-activity-style 'default'

set -g clock-mode-colour '#89b4fa'
